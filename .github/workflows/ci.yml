name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        run: npm run build

      - name: Check export output
        run: |
          test -f out/index.html
          test -f out/artigos.html
          test -f out/sitemap.xml
          test -f out/robots.txt
          echo "Export OK: $(find out -name '*.html' | wc -l) páginas HTML geradas"
